spring:
  application:
    name: ToolCalling
  ai:
    openai:
      api-key: ${OPEN_AI_API_KEY}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/toolcalling
    username: root
    password: ${SENHA_MYSQL}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
    show-sql: false
    open-in-view: false
logging:
  level:
    org.springframework.ai: DEBUG

